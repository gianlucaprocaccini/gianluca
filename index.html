<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Gianluca Procaccini </title>
  <meta name="description" content="Gianluca Procaccini is a designer focused on branding, digital experiences, and visual storytelling.">

  <!-- Glowing green dot favicon -->
  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <defs>
      <filter id='g'>
        <feGaussianBlur stdDeviation='8' result='b'/>
        <feMerge>
          <feMergeNode in='b'/>
          <feMergeNode in='SourceGraphic'/>
        </feMerge>
      </filter>
    </defs>
    <circle cx='50' cy='50' r='20' fill='%2300cc66' filter='url(%23g)'/>
  </svg>">

  <!-- Relaxed CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: #00cc66;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* subtle grain overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.06;
      background-image: radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 3px 3px;
    }

    /* flicker */
    @keyframes flicker {
      0% { opacity: 1; }
      2% { opacity: 0.85; }
      4% { opacity: 1; }
      8% { opacity: 0.9; }
      10% { opacity: 1; }
      100% { opacity: 1; }
    }

    /* glow pulse */
    @keyframes glowPulse {
      0%, 100% {
        text-shadow: 0 0 6px #00cc66, 0 0 16px #00cc66;
      }
      50% {
        text-shadow: 0 0 12px #00cc66, 0 0 32px #00cc66;
      }
    }

    .name {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 18px;
      text-shadow: 0 0 4px #00cc66, 0 0 8px #00cc66;
      opacity: 0.75;
      letter-spacing: 0.5px;
      animation: flicker 6s infinite;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      text-align: center;
      letter-spacing: 0.5px;
      animation: glowPulse 3s ease-in-out infinite, flicker 8s infinite;
    }

    /* cursor */
    .cursor::after {
      content: "_";
      margin-left: 5px;
      animation: blink 1.6s steps(1) infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    /* cursor glow */
    .cursor-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(0,255,120,0.35) 0%, rgba(0,204,102,0.2) 40%, transparent 70%);
      filter: blur(8px);
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* Mobile responsive: smaller center text */
    @media (max-width: 600px) {
      .center-text {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="name">© <span id="year"></span> Gianluca Procaccini</div>
  <div class="center-text cursor">big things coming soon...</div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    const glow = document.getElementById('cursorGlow');

    let mouseX = 0, mouseY = 0;
    let currentX = 0, currentY = 0;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    let running = true;

    document.addEventListener("visibilitychange", () => {
      running = !document.hidden;
      if (running) animate();
    });

    function animate() {
      if (!running) return;

      currentX += (mouseX - currentX) * 0.1;
      currentY += (mouseY - currentY) * 0.1;

      glow.style.left = currentX + 'px';
      glow.style.top = currentY + 'px';

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
